name: ecohome_flutter
description: EcoHome Store - App móvil multiplataforma (Flutter) para gestión de catálogo y chat en tiempo real.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.3

  # Socket.IO client
  socket_io_client: ^2.0.3+1

  # State management
  provider: ^6.1.2

  # Persistencia local (guardar JWT)
  shared_preferences: ^2.2.3

  # Iconos
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
