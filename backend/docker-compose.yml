services:
  postgres:
    image: postgres:16-alpine
    container_name: ecohome-postgres
    environment:
      POSTGRES_DB:       ecohome_chat
      POSTGRES_USER:     ecohome_user
      POSTGRES_PASSWORD: ecohome_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecohome_user -d ecohome_chat"]
      interval: 5s
      retries: 10

  backend:
    build: .
    container_name: ecohome-backend
    environment:
      DB_HOST:     postgres
      DB_PASSWORD: ecohome_pass
      JWT_SECRET:  XioW5FPP7WBz/gmjSrUb/Xf19BIT7CQ57r4h3ueju4c=
      CORS_ORIGIN: ""
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
